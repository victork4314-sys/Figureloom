<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc"><title id="title">Annotated FigureLoom phone interface</title><desc id="desc">A phone layout with compact top controls, scrollable tabs, the canvas, and the bottom dock.</desc><style>:root{color-scheme:light dark}.bg{fill:#eef3f2}.phone{fill:#151918}.screen{fill:#f6f8f7}.bar{fill:#e5efec}.tab{fill:#fff;stroke:#bfd0cb;stroke-width:2}.active{fill:#d9eee8;stroke:#39786d}.work{fill:#dce5e3}.page{fill:#fff;stroke:#7f9992;stroke-width:3}.dock{fill:#fff;stroke:#b8cbc6;stroke-width:2}.text{fill:#1e3731;font:700 21px system-ui}.small{fill:#60736d;font:600 16px system-ui}.call{fill:#2f7468}.num{fill:#fff;font:800 22px system-ui}.line{stroke:#2f7468;stroke-width:4;fill:none;stroke-linecap:round}.obj{fill:#cfe0ff;stroke:#4f6fd8;stroke-width:3}@media(prefers-color-scheme:dark){.bg{fill:#171d1b}.screen{fill:#242b29}.bar{fill:#2d3935}.tab,.dock{fill:#303936;stroke:#4d5d58}.active{fill:#27463f;stroke:#77baa9}.work{fill:#1c2321}.text{fill:#eef8f5}.small{fill:#b2c2bd}.line{stroke:#78c4b5}.call{fill:#397f72}}</style><rect class="bg" width="1200" height="860" rx="38"/><rect class="phone" x="382" y="32" width="436" height="796" rx="62"/><rect class="screen" x="401" y="54" width="398" height="752" rx="44"/><rect class="bar" x="401" y="54" width="398" height="82" rx="44"/><rect x="520" y="68" width="160" height="25" rx="13" fill="#111"/><text x="425" y="118" class="text">Figure 1</text><g><rect class="tab" x="614" y="98" width="42" height="30" rx="15"/><text x="627" y="120" class="small">?</text><rect class="tab" x="662" y="98" width="42" height="30" rx="9"/><text x="674" y="120" class="small">↶</text><rect class="tab" x="710" y="98" width="42" height="30" rx="9"/><text x="722" y="120" class="small">↷</text><rect x="758" y="98" width="29" height="30" rx="9" fill="#2563eb"/></g><g><rect class="tab active" x="414" y="148" width="78" height="39" rx="10"/><text x="431" y="174" class="small">Home</text><rect class="tab" x="500" y="148" width="70" height="39" rx="10"/><text x="521" y="174" class="small">Add</text><rect class="tab" x="578" y="148" width="118" height="39" rx="10"/><text x="591" y="174" class="small">Illustrations</text><rect class="tab" x="704" y="148" width="82" height="39" rx="10"/><text x="717" y="174" class="small">Style</text></g><rect class="work" x="414" y="201" width="372" height="468" rx="16"/><rect class="page" x="447" y="260" width="306" height="300" rx="4"/><rect class="obj" x="493" y="351" width="95" height="64" rx="15"/><rect x="631" y="351" width="82" height="64" rx="32" fill="#f9d8df" stroke="#b64b64" stroke-width="3"/><path d="M588 383h43" stroke="#334155" stroke-width="5"/><path d="m619 372 15 11-15 11" fill="none" stroke="#334155" stroke-width="4"/><rect class="tab" x="520" y="611" width="160" height="42" rx="21"/><text x="551" y="638" class="small">− 100% +</text><rect class="dock" x="414" y="684" width="372" height="102" rx="23"/><g text-anchor="middle"><text x="462" y="724" class="text">⌁</text><text x="462" y="759" class="small">Tools</text><text x="553" y="724" class="text">▤</text><text x="553" y="759" class="small">Pages</text><text x="644" y="724" class="text">✎</text><text x="644" y="759" class="small">Edit</text><text x="735" y="724" class="text">•••</text><text x="735" y="759" class="small">More</text></g><g><circle class="call" cx="220" cy="120" r="25"/><text x="213" y="128" class="num">1</text><path class="line" d="M245 120H395"/><text x="66" y="83" class="text">Compact header</text><text x="66" y="108" class="small">Project, undo, redo, Help, Export</text><circle class="call" cx="205" cy="300" r="25"/><text x="198" y="308" class="num">2</text><path class="line" d="M230 300H414"/><text x="58" y="252" class="text">Canvas first</text><text x="58" y="277" class="small">Most of the screen stays available</text><circle class="call" cx="976" cy="170" r="25"/><text x="969" y="178" class="num">3</text><path class="line" d="M951 170H790"/><text x="864" y="104" class="text">Scrollable tabs</text><text x="864" y="129" class="small">Same tools, narrow layout</text><circle class="call" cx="982" cy="730" r="25"/><text x="975" y="738" class="num">4</text><path class="line" d="M957 730H790"/><text x="862" y="667" class="text">Bottom dock</text><text x="862" y="692" class="small">Tools, Pages, Edit, More</text></g></svg>