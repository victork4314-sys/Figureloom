name: Validate FigureLoom Bio flow

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bio_flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check browser JavaScript syntax
        run: |
          node --check ide/ide-control-flow-runtime.js
          node --check ide/ide-decisions.js
          node --check ide/ide-addon-runtime.js
          node --check ide/ide-decision-core.js
          node --check ide/ide-current-file-language.js
          node --check ide/ide-language-manifest.js
          node --check ide/ide-language-aliases.js
          node --check ide/ide-generated-current-file.js
          node --check ide/ide-language-translation-bridge.js
          node --check ide/ide-language-highlighter.js
          node --check ide/ide-language-catalog-ui.js
          node --check ide/ide-language-blocks-ui.js
          node --check ide/ide-analysis-language.js
          node --check ide/ide-complete-language.js
          node --check ide/ide-complete-language-bridge.js
          node --check ide/ide-translator.js
          node --check ide/ide-approved-common.js
          node --check ide/ide-addon-packages.js
          node --check ide/ide-builtin-language-support.js
          node --check scripts/validate-bio-control-flow.mjs
          node --check scripts/validate-bio-browser-example.mjs
          node --check scripts/validate-bio-current-file.mjs
          node --check scripts/validate-bio-current-file-runtime.mjs
          node --check scripts/validate-bio-language-manifest.mjs
          node --check scripts/validate-bio-language-aliases.mjs
          node --check scripts/validate-bio-statement-registry.mjs
          node --check scripts/validate-bio-analysis-language.mjs
          node --check scripts/validate-bio-complete-language.mjs
          node --check scripts/validate-bio-translator.mjs
          node --check scripts/validate-bio-decision-core.mjs
          node --check scripts/validate-bio-runtime-race.mjs
          node --check scripts/validate-bio-documentation.mjs
          node --check scripts/validate-bio-no-placeholders.mjs

      - name: Validate shared language manifest
        run: node scripts/validate-bio-language-manifest.mjs

      - name: Validate every accepted browser wording and execution family
        run: node scripts/validate-bio-language-aliases.mjs

      - name: Validate completed documentation and wiki sync
        run: node scripts/validate-bio-documentation.mjs

      - name: Reject unfinished runtime and translation placeholders
        run: node scripts/validate-bio-no-placeholders.mjs

      - name: Validate registered language handlers
        run: node scripts/validate-bio-statement-registry.mjs

      - name: Run native statistics and figures in the browser
        run: node scripts/validate-bio-analysis-language.mjs

      - name: Run the completed language in the browser
        run: node scripts/validate-bio-complete-language.mjs

      - name: Validate current-file sentences
        run: node scripts/validate-bio-current-file.mjs

      - name: Run current-file sentences through the real browser runtime
        run: node scripts/validate-bio-current-file-runtime.mjs

      - name: Validate browser translation targets and block punctuation
        run: node scripts/validate-bio-translator.mjs

      - name: Validate exact decision words
        run: node scripts/validate-bio-decision-core.mjs

      - name: Validate browser control flow
        run: node scripts/validate-bio-control-flow.mjs

      - name: Run bundled microbiology example
        run: node scripts/validate-bio-browser-example.mjs

      - name: Recognize decisions before runtime loading
        run: node scripts/validate-bio-runtime-race.mjs recognition

      - name: Hold program while runtime loads
        run: node scripts/validate-bio-runtime-race.mjs waiting

      - name: Load and claim the program
        run: node scripts/validate-bio-runtime-race.mjs runtime-ready

      - name: Retry Run into the complete runtime
        run: node scripts/validate-bio-runtime-race.mjs retried

      - name: Leave the loading status
        run: node scripts/validate-bio-runtime-race.mjs left-waiting

      - name: Run control flow tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_control_flow.py' -v

      - name: Run exhaustive accepted-language tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_language_aliases.py' -v

      - name: Run completed terminal language tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_complete_language.py' -v

      - name: Run native terminal analysis tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_analysis_language.py' -v

      - name: Run complete FigureLoom Bio tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -v

      - name: Rehearse clean Linux desktop installation
        run: |
          browser="$(command -v chromium || command -v chromium-browser || command -v google-chrome || command -v google-chrome-stable || command -v firefox || command -v firefox-esr || true)"
          test -n "$browser"
          sudo env \
            FIGURELOOM_SOURCE_DIR="$GITHUB_WORKSPACE" \
            FIGURELOOM_VENV_DIR=/opt/figureloom-bio-ci \
            FIGURELOOM_APP_DIR=/opt/figureloom-desktop-ci \
            SUDO_USER="$USER" \
            bash figureloom-bio/linux/install-workspace.sh
          test -x /usr/local/bin/figureloom-bio-installer
          test -x /usr/local/libexec/figureloom-bio-update
          test -x /usr/local/bin/figureloom-bio-ide
          test -x /usr/local/bin/figureloom-bio-test
          test -f "$HOME/Desktop/Install or Update FigureLoom Bio.desktop"
          test -f "$HOME/Desktop/FigureLoom Bio IDE.desktop"
          test -f "$HOME/Desktop/Test FigureLoom Bio.desktop"
          test -f "$HOME/Desktop/FigureLoom Bio Test Files/quick-test.flbio"
          /opt/figureloom-bio-ci/bin/flbio quick-test /tmp/figureloom-clean-install-test

  exact_published_windows:
    if: ${{ github.event_name == 'pull_request' && github.head_ref == 'validation/exact-published-windows' }}
    name: Exact published Windows package
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Download the exact published Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release | Out-Null
          gh release download figureloom-bio-windows-installer `
            --repo $env:GITHUB_REPOSITORY `
            --pattern 'FigureLoom-Bio-Installer.exe' `
            --dir release `
            --clobber
          if ($LASTEXITCODE -ne 0) { throw 'The current public Windows installer could not be downloaded.' }
          $installer = Join-Path $PWD 'release\FigureLoom-Bio-Installer.exe'
          if (-not (Test-Path $installer)) { throw 'The public Windows installer is missing.' }
          $bytes = [System.IO.File]::ReadAllBytes($installer)
          if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw 'The public Windows download is not a valid EXE.'
          }
          Get-FileHash -Algorithm SHA256 $installer | Format-List

      - name: Install and test the exact published Windows package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Run-Bounded([string]$Name, [string]$FilePath, [string[]]$Arguments, [int]$Seconds) {
            Write-Host "START: $Name"
            $process = Start-Process -FilePath $FilePath -ArgumentList $Arguments -PassThru
            if (-not $process.WaitForExit($Seconds * 1000)) {
              try { Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue } catch {}
              throw "$Name exceeded $Seconds seconds."
            }
            if ($process.ExitCode -ne 0) {
              throw "$Name exited with code $($process.ExitCode)."
            }
            Write-Host "PASS: $Name"
          }

          $installer = Join-Path $PWD 'release\FigureLoom-Bio-Installer.exe'
          Run-Bounded 'Silent installation' $installer @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART') 300

          $app = Join-Path $env:LOCALAPPDATA 'Programs\FigureLoom Bio'
          $ide = Join-Path $app 'FigureLoom Bio IDE.exe'
          $testApp = Join-Path $app 'Test FigureLoom Bio.exe'
          $updater = Join-Path $app 'Install or Update FigureLoom Bio.exe'
          $cli = Join-Path $app 'flbio.exe'
          foreach ($path in @($ide, $testApp, $updater, $cli)) {
            if (-not (Test-Path $path)) { throw "The installed file is missing: $path" }
          }

          $forbiddenWeb = Get-ChildItem -Path $app -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -in @('.html','.htm','.js','.mjs') } |
            Select-Object -First 1
          if ($forbiddenWeb) { throw "The installed native app contains a forbidden web file: $($forbiddenWeb.FullName)" }

          Run-Bounded 'Native Windows IDE startup, paint, and syntax-color self-test' $ide @('--self-test') 180
          Run-Bounded 'Native Windows Test app self-test' $testApp @('--self-test') 240
          Run-Bounded 'Native Windows Updater self-test' $updater @('--self-test') 180
          Run-Bounded 'Installed CLI doctor' $cli @('doctor') 90

          $quickRoot = Join-Path $env:RUNNER_TEMP 'published-figureloom-bio-windows-test'
          Remove-Item -Recurse -Force $quickRoot -ErrorAction SilentlyContinue
          Run-Bounded 'Installed language quick test' $cli @('quick-test', $quickRoot) 240
          $resultFile = Join-Path $quickRoot 'TEST-RESULT.txt'
          $quickVolcano = Join-Path $quickRoot 'quick-volcano.svg'
          if (-not (Test-Path $resultFile)) { throw 'The installed quick test did not create TEST-RESULT.txt.' }
          if ((Get-Content -Raw $resultFile) -notmatch 'FIGURELOOM BIO QUICK TEST PASSED') {
            throw 'The installed quick test did not report success.'
          }
          if (-not (Test-Path $quickVolcano)) { throw 'The installed quick test did not create the real volcano SVG.' }
          $quickSvg = Get-Content -Raw $quickVolcano
          if ($quickSvg -notmatch 'data-significance="higher"' -or $quickSvg -notmatch 'data-significance="lower"') {
            throw 'The installed volcano SVG is missing higher or lower significance groups.'
          }

          $languageDir = Join-Path $env:RUNNER_TEMP 'published-figureloom-bio-windows-known-language'
          Remove-Item -Recurse -Force $languageDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $languageDir | Out-Null
          Copy-Item (Join-Path $quickRoot 'measurements.csv') (Join-Path $languageDir 'measurements.csv')
          @(
            'Open the file measurements.csv.'
            'Draw a vulcano chart from effect and p_value.'
          ) | Set-Content -Encoding utf8 (Join-Path $languageDir 'known-language.flbio')
          Push-Location $languageDir
          try {
            $knownOutput = & $cli run known-language.flbio 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0) { throw "Known valid vulcano wording failed:`n$knownOutput" }
          } finally {
            Pop-Location
          }
          if (-not (Test-Path (Join-Path $languageDir 'volcano-plot.svg'))) {
            throw 'Known valid vulcano wording did not create volcano-plot.svg.'
          }
          if ($knownOutput -notmatch 'Volcano plot') {
            throw 'Known valid vulcano wording did not report a Volcano plot result.'
          }

          $unknownDir = Join-Path $env:RUNNER_TEMP 'published-figureloom-bio-windows-error-explanation'
          Remove-Item -Recurse -Force $unknownDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $unknownDir | Out-Null
          'Create something scientific somehow.' | Set-Content -Encoding utf8 (Join-Path $unknownDir 'unknown.flbio')
          Push-Location $unknownDir
          try {
            $unknownOutput = & $cli run unknown.flbio 2>&1 | Out-String
            $unknownExit = $LASTEXITCODE
          } finally {
            Pop-Location
          }
          if ($unknownExit -eq 0) { throw 'A genuinely unknown instruction was incorrectly accepted.' }
          if ($unknownOutput -notmatch 'What happened' -or $unknownOutput -notmatch 'How to fix it|What to do') {
            throw "The installed error explanation is not simple and complete:`n$unknownOutput"
          }

          Write-Host 'The exact published Windows installer passed every required native and language test.'
