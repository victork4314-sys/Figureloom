name: Validate FigureLoom Bio flow

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bio_flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check browser decision runtime
        run: |
          node --check ide/ide-control-flow-runtime.js
          node --check ide/ide-decisions.js
          node --check scripts/validate-bio-control-flow.mjs
          node scripts/validate-bio-control-flow.mjs

      - name: Run control flow tests
        id: flow_tests
        shell: bash
        run: |
          set +e
          cd figureloom-bio
          python3 -m unittest discover -s tests -p 'test_control_flow.py' -v 2>&1 | tee ../control-flow-test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload control flow test log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: control-flow-test-log
          path: control-flow-test.log
          if-no-files-found: error

      - name: Run complete FigureLoom Bio tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -v
