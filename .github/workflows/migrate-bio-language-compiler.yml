name: Migrate FigureLoom Bio compiler language

on:
  push:
    branches:
      - agent/fix-word-term-grammar
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply compiler vocabulary migration
        run: python3 scripts/migrate-bio-language-to-compiler.py

      - name: Keep workflow changes outside the generated commit
        run: git checkout -- .github/workflows/validate-bio-flow.yml

      - name: Commit generated documentation and labels
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet; then
            echo "Migration is already applied."
            exit 0
          fi
          git config user.name "FigureLoom compiler migration"
          git config user.email "actions@users.noreply.github.com"
          git add README.md figureloom-bio wiki scripts
          git commit -m "Migrate FigureLoom Bio docs to compiler grammar"
          git push origin HEAD:"$HEAD_BRANCH"
