name: Localization audit

on:
  pull_request:
    branches: [main]
    paths:
      - scripts/localization-audit.mjs
      - scripts/generate-localizations.mjs
      - scripts/build-language-pack.mjs
      - .github/workflows/localization-audit.yml
  workflow_dispatch:

concurrency:
  group: complete-interface-localization-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  models: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Extract interface strings
        run: node scripts/localization-audit.mjs
      - name: Generate contextual translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCALIZATION_MODEL: openai/gpt-4.1-mini
        run: node scripts/generate-localizations.mjs
      - name: Build exact language pack
        if: success()
        run: |
          node scripts/build-language-pack.mjs
          node --check language-complete-pack.js
      - name: Upload localization work
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: complete-interface-localization
          path: |
            interface-string-inventory.json
            complete-interface-translations.json
            complete-interface-translations.partial.json
            language-complete-pack.js
          if-no-files-found: warn
      - name: Commit validated language pack to audit branch
        if: success() && github.event_name == 'pull_request'
        run: |
          git config user.name "FigureLoom localization audit"
          git config user.email "actions@users.noreply.github.com"
          git add language-complete-pack.js
          git diff --cached --quiet && exit 0
          git commit -m "Add audited complete interface language pack"
          git push origin HEAD:${{ github.head_ref }}
