name: Clear redundant FigureLoom Bio macOS queue

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/clear-macos-runner-queue.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded broken Mac run and redundant queues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Run 30092415672 used the unsafe worker-thread UI callback. Its Intel
          # job already failed and its Apple job is only holding a runner needed
          # by the corrected 2c0fef1 publisher.
          gh run cancel 30092415672 --repo "$GITHUB_REPOSITORY" || true

          for workflow in \
            build-bio-cross-platform-installers.yml \
            audit-bio-install-cycles.yml; do
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$workflow" \
              --status queued \
              --limit 100 \
              --json databaseId \
              --jq '.[].databaseId' \
            | while read -r run_id; do
                [[ -n "$run_id" ]] || continue
                echo "Cancelling redundant queued run $run_id from $workflow"
                gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
              done
          done

          echo 'The corrected independent run 30093844734 was left untouched.'
