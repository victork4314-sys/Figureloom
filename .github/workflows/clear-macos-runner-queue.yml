name: Clear redundant FigureLoom Bio macOS queue

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/clear-macos-runner-queue.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  clear:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded Mac runs and redundant queues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # These runs used the older threaded self-test implementations.
          gh run cancel 30092415672 --repo "$GITHUB_REPOSITORY" || true
          gh run cancel 30093844734 --repo "$GITHUB_REPOSITORY" || true

          for workflow in \
            build-bio-cross-platform-installers.yml \
            audit-bio-install-cycles.yml; do
            gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$workflow" \
              --status queued \
              --limit 100 \
              --json databaseId \
              --jq '.[].databaseId' \
            | while read -r run_id; do
                [[ -n "$run_id" ]] || continue
                gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
              done
          done

          echo 'The newest 4dff001 independent Mac publisher was left untouched.'
