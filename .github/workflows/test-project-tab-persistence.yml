name: Test unsaved project tab persistence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check JavaScript syntax
        run: node --check tests/project-tab-persistence.spec.js
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run mobile project-tab test
        run: npx playwright test tests/project-tab-persistence.spec.js --project=mobile
      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: project-tab-persistence-results
          path: test-results
          if-no-files-found: warn
