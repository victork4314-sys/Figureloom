name: Cancel obsolete FigureLoom Bio release runs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cancel-obsolete-combined-bio-release.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded release runs only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          final_mac_run=30095038489
          for old_mac_run in 30092415672 30093844734 30094561750; do
            status="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$old_mac_run" --jq .status)"
            if [[ "$status" != completed ]]; then
              gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$old_mac_run/cancel" || \
                gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$old_mac_run/force-cancel" || true
            fi
          done

          combined_workflow_id=319030920
          : > /tmp/obsolete-runs.txt
          for status in queued in_progress pending waiting; do
            gh api "repos/$GITHUB_REPOSITORY/actions/runs?status=$status&per_page=100" \
              --jq ".workflow_runs[] | select(.workflow_id == $combined_workflow_id) | .id" \
              >> /tmp/obsolete-runs.txt
          done
          sort -u /tmp/obsolete-runs.txt -o /tmp/obsolete-runs.txt
          while read -r run_id; do
            [[ -n "$run_id" ]] || continue
            [[ "$run_id" != "$final_mac_run" ]] || continue
            gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/cancel" || \
              gh api --method POST "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/force-cancel" || true
          done < /tmp/obsolete-runs.txt
