name: Publish proven FigureLoom Bio Windows installer
# Restricted same-repository diagnostic trigger.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-proven-windows-installer.yml'
  pull_request:
    paths:
      - '.github/workflows/publish-proven-windows-installer.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-proven-figureloom-bio-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'pull_request' || (github.actor == 'victork4314-sys' && github.head_ref == 'rescue/publish-proven-windows')
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout trusted repository state
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Download the exact already-tested Windows installer artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'rescue\windows' | Out-Null
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2026-03-10'
          }
          $url = "https://api.github.com/repos/$env:GITHUB_REPOSITORY/actions/artifacts/8582215395/zip"
          Invoke-WebRequest -Uri $url -Headers $headers -OutFile 'rescue\windows-artifact.zip'
          Expand-Archive -Path 'rescue\windows-artifact.zip' -DestinationPath 'rescue\windows' -Force
          $installer = Get-ChildItem -Path 'rescue\windows' -Recurse -File -Filter 'FigureLoom-Bio-Installer.exe' | Select-Object -First 1
          if (-not $installer) { throw 'The proven Windows installer was not present in the artifact.' }
          $bytes = [System.IO.File]::ReadAllBytes($installer.FullName)
          if ($bytes.Length -lt 2 -or $bytes[0] -ne 0x4D -or $bytes[1] -ne 0x5A) {
            throw 'The downloaded file is not a valid Windows executable.'
          }
          Copy-Item -Path $installer.FullName -Destination 'rescue\FigureLoom-Bio-Installer.exe' -Force
          Get-FileHash -Algorithm SHA256 'rescue\FigureLoom-Bio-Installer.exe' | Format-List

      - name: Replace the stable Windows download and tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = 'figureloom-bio-windows-installer'
          $target = 'e23b6c162ca6b09fb2a3fbedc1b0f4d95635bd05'
          $asset = 'rescue\FigureLoom-Bio-Installer.exe'
          $title = 'FigureLoom Bio Windows Installer'
          $notes = 'Download the EXE and follow the normal installer. This is the native desktop build that passed installation, IDE startup and paint, syntax coloring, Test, Updater, CLI doctor, Desktop test files, language quick tests, and the real volcano-plot test. It contains no bundled HTML or browser interface.'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag --force $tag $target
          if ($LASTEXITCODE -ne 0) { throw 'Could not create the corrected stable tag locally.' }
          git push origin "refs/tags/$tag" --force
          if ($LASTEXITCODE -ne 0) { throw 'Could not move the corrected stable tag on GitHub.' }

          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release upload $tag $asset --clobber
            if ($LASTEXITCODE -ne 0) { throw 'Could not replace the stable Windows installer asset.' }
            gh release edit $tag --latest --title $title --notes $notes
            if ($LASTEXITCODE -ne 0) { throw 'Could not update the stable Windows release details.' }
          } else {
            gh release create $tag $asset --target $target --latest --title $title --notes $notes
            if ($LASTEXITCODE -ne 0) { throw 'Could not create the stable Windows release.' }
          }

          $remoteLine = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) { throw 'Could not verify the corrected stable tag.' }
          $remoteSha = ($remoteLine -split '\s+')[0]
          if ($remoteSha -ne $target) { throw "Stable tag points to $remoteSha instead of $target." }

          $assets = gh release view $tag --json assets --jq '.assets[].name'
          if ($LASTEXITCODE -ne 0 -or $assets -notcontains 'FigureLoom-Bio-Installer.exe') {
            throw 'The corrected Windows installer is missing from the stable release.'
          }
