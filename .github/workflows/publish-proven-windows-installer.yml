name: Publish proven FigureLoom Bio Windows installer
# Restricted same-repository diagnostic trigger.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-proven-windows-installer.yml'
      - '.github/rescue/publish-proven-windows.ps1'
  pull_request:
    paths:
      - '.github/workflows/publish-proven-windows-installer.yml'
      - '.github/rescue/publish-proven-windows.ps1'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-proven-figureloom-bio-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name != 'pull_request' || (github.actor == 'victork4314-sys' && github.head_ref == 'rescue/publish-proven-windows')
    strategy:
      fail-fast: false
      matrix:
        runner:
          - windows-latest
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - name: Checkout trusted repository state
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Publish and verify the exact already-tested Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/rescue/publish-proven-windows.ps1
