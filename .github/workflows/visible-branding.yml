name: Visible branding audit

on:
  pull_request:
    paths:
      - 'visible-brand-finalizer.js'
      - 'brand-cleanup.js'
      - 'safe-refresh.js'
      - 'service-worker.js'
      - 'tests/visible-branding.spec.js'
      - 'playwright.config.js'
      - '.github/workflows/visible-branding.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  branding-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check branding JavaScript syntax
        run: |
          node --check visible-brand-finalizer.js
          node --check safe-refresh.js
          node --check service-worker.js
          node --check tests/visible-branding.spec.js
      - name: Install test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run visible branding audit
        run: npx playwright test tests/visible-branding.spec.js
      - name: Upload branding test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: visible-branding-results
          path: test-results
          if-no-files-found: warn