name: Publish FigureLoom Bio macOS installers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-fixed-macos-installers.yml'
      - 'figureloom-bio/macos/**'
      - 'figureloom-bio/platform/**'
      - 'figureloom-bio/figureloom_bio/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: figureloom-bio-macos-publish-${{ github.sha }}
  cancel-in-progress: false

jobs:
  apple_silicon:
    name: Build Apple Silicon package
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Apple Silicon package
        env:
          FIGURELOOM_MAC_ARCH_LABEL: arm64
        run: bash figureloom-bio/macos/build-installer.sh dist

      - name: Upload Apple Silicon package
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-macOS-Apple-Silicon-Installer
          path: dist/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          if-no-files-found: error

  intel:
    name: Build Intel package
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Intel package
        env:
          FIGURELOOM_MAC_ARCH_LABEL: x86_64
        run: bash figureloom-bio/macos/build-installer.sh dist

      - name: Upload Intel package
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-macOS-Intel-Installer
          path: dist/FigureLoom-Bio-Installer-macOS-Intel.pkg
          if-no-files-found: error

  publish:
    name: Upload both Mac packages to the release
    needs: [apple_silicon, intel]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download Apple Silicon package
        uses: actions/download-artifact@v8
        with:
          name: FigureLoom-Bio-macOS-Apple-Silicon-Installer
          path: release

      - name: Download Intel package
        uses: actions/download-artifact@v8
        with:
          name: FigureLoom-Bio-macOS-Intel-Installer
          path: release

      - name: Upload both packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='figureloom-bio-macos-installer'
          apple='release/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg'
          intel='release/FigureLoom-Bio-Installer-macOS-Intel.pkg'

          test -s "$apple"
          test -s "$intel"

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$apple" "$intel" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$tag" "$apple" "$intel" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --latest \
              --title 'FigureLoom Bio macOS Installers' \
              --notes 'Choose Apple Silicon for M-series Macs or Intel for Intel Macs.'
          fi
