name: Publish fixed FigureLoom Bio macOS installers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-fixed-macos-installers.yml'
      - '.github/scripts/test-installed-macos-package.sh'
      - 'figureloom-bio/macos/**'
      - 'figureloom-bio/platform/**'
      - 'figureloom-bio/figureloom_bio/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: figureloom-bio-fixed-macos-${{ github.sha }}
  cancel-in-progress: false

jobs:
  apple_silicon:
    name: Apple Silicon package
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout repaired source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Apple Silicon package
        env:
          FIGURELOOM_MAC_ARCH_LABEL: arm64
        run: bash figureloom-bio/macos/build-installer.sh dist

      - name: Install and prove Apple Silicon package
        env:
          PACKAGE: dist/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          EXPECTED_ARCH: arm64
          TEST_ROOT: ${{ runner.temp }}/figureloom-bio-macos-arm-test
        run: bash .github/scripts/test-installed-macos-package.sh

      - name: Upload proven Apple Silicon package
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-macOS-Apple-Silicon-Installer
          path: dist/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          if-no-files-found: error

  intel:
    name: Intel package
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - name: Checkout repaired source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build Intel package
        env:
          FIGURELOOM_MAC_ARCH_LABEL: x86_64
        run: bash figureloom-bio/macos/build-installer.sh dist

      - name: Install and prove Intel package
        env:
          PACKAGE: dist/FigureLoom-Bio-Installer-macOS-Intel.pkg
          EXPECTED_ARCH: x86_64
          TEST_ROOT: ${{ runner.temp }}/figureloom-bio-macos-intel-test
        run: bash .github/scripts/test-installed-macos-package.sh

      - name: Upload proven Intel package
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-macOS-Intel-Installer
          path: dist/FigureLoom-Bio-Installer-macOS-Intel.pkg
          if-no-files-found: error

  publish:
    name: Publish both proven Mac packages
    needs: [apple_silicon, intel]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Apple Silicon package
        uses: actions/download-artifact@v8
        with:
          name: FigureLoom-Bio-macOS-Apple-Silicon-Installer
          path: release

      - name: Download Intel package
        uses: actions/download-artifact@v8
        with:
          name: FigureLoom-Bio-macOS-Intel-Installer
          path: release

      - name: Publish and verify both packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag='figureloom-bio-macos-installer'
          apple='release/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg'
          intel='release/FigureLoom-Bio-Installer-macOS-Intel.pkg'

          test -s "$apple"
          test -s "$intel"
          test "$(head -c 4 "$apple")" = 'xar!'
          test "$(head -c 4 "$intel")" = 'xar!'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$apple" "$intel" --clobber
          else
            git tag --force "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag" --force
            gh release create "$tag" "$apple" "$intel" \
              --target "$GITHUB_SHA" \
              --latest \
              --title 'FigureLoom Bio macOS Installers' \
              --notes 'Choose Apple Silicon for M-series Macs or Intel for Intel Macs. Both packages were installed and tested before publication.'
          fi

          git tag --force "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag" --force
          gh release edit "$tag" \
            --latest \
            --title 'FigureLoom Bio macOS Installers' \
            --notes 'Choose Apple Silicon for M-series Macs or Intel for Intel Macs. Both packages were installed and tested before publication.'

          mkdir verified-downloads
          gh release download "$tag" \
            --pattern 'FigureLoom-Bio-Installer-macOS-*.pkg' \
            --dir verified-downloads \
            --clobber
          cmp "$apple" verified-downloads/FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
          cmp "$intel" verified-downloads/FigureLoom-Bio-Installer-macOS-Intel.pkg

          remote_sha="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
          test "$remote_sha" = "$GITHUB_SHA"
          echo 'Both fixed macOS installers are published and byte-for-byte verified.'
