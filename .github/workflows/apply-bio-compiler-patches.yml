name: Apply FigureLoom Bio compiler patches

on:
  push:
    branches:
      - agent/fix-word-term-grammar
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-bio-compiler-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout compiler branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply compiler source patches
        run: |
          python3 scripts/fix-bio-python-compiler.py
          python3 scripts/fix-bio-browser-compiler.py
          python3 -m py_compile figureloom-bio/figureloom_bio/language_compiler.py
          node --check ide/ide-language-compiler.js

      - name: Commit applied compiler patches
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          if git diff --quiet; then
            echo "Compiler patches are already applied."
            exit 0
          fi
          git config user.name "FigureLoom compiler patch"
          git config user.email "actions@users.noreply.github.com"
          git add figureloom-bio/figureloom_bio/language_compiler.py ide/ide-language-compiler.js
          git commit -m "Preserve grammar parity in compiler frontends"
          git push origin HEAD:"$HEAD_BRANCH"
