name: Patch FigureLoom Bio run guide

on:
  push:
    branches: [agent/figureloom-bio-desktop-ide-installer]
    paths: [.github/workflows/patch-bio-run-guide.yml]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/figureloom-bio-desktop-ide-installer
      - name: Restore the run-program section
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('wiki/FigureLoom-Bio.md')
          text = path.read_text(encoding='utf-8')
          marker = '## Optional bioinformatics tools'
          section = '''### Run a program

          Put a `.flbio` program and its input files in the same folder, then run:

          ```bash
          flbio run program.flbio
          ```

          Native table, sequence, FASTQ, alignment, variant, gene, primer, tree, statistics, and figure commands run without extra permission.

          A program that launches an installed bioinformatics tool needs explicit permission:

          ```bash
          flbio run bacterial-analysis.flbio --allow-tools
          ```

          Without `--allow-tools`, FigureLoom Bio stops and explains which sentence requested local tool access.

          '''
          if 'flbio run program.flbio' not in text:
              if marker not in text:
                  raise SystemExit('Could not find optional-tools section')
              text = text.replace(marker, section + marker, 1)
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "FigureLoom Docs"
          git config user.email "actions@users.noreply.github.com"
          git add wiki/FigureLoom-Bio.md
          git diff --cached --check
          git commit -m "Restore FigureLoom Bio run instructions"
          git push origin HEAD:agent/figureloom-bio-desktop-ide-installer
