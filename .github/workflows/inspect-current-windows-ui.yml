name: Inspect published Windows desktop UI

# Capture the final transparent-label stable installer in both themes.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/inspect-current-windows-ui.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - name: Report visual inspection start
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 231 --repo $env:GITHUB_REPOSITORY --body "VISUAL CHECK STARTED: run $env:GITHUB_RUN_ID is installing the published Windows EXE and capturing the real light and dark windows."

      - name: Download published Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Force -Path validation | Out-Null
          gh release download figureloom-bio-windows-installer --repo $env:GITHUB_REPOSITORY --pattern 'FigureLoom-Bio-Installer.exe' --dir validation --clobber
          if (-not (Test-Path 'validation/FigureLoom-Bio-Installer.exe')) { throw 'Published Windows installer was not downloaded.' }

      - name: Install and capture both themes
        shell: pwsh
        env:
          FIGURELOOM_NATIVE_SCREENSHOT_DIR: ${{ runner.temp }}\figureloom-native-screenshots
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Resolve-Path 'validation/FigureLoom-Bio-Installer.exe'
          $install = Start-Process -FilePath $installer -ArgumentList @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART') -PassThru
          if (-not $install.WaitForExit(300000)) { Stop-Process -Id $install.Id -Force; throw 'Published installer did not finish.' }
          if ($install.ExitCode -ne 0) { throw "Published installer exited with code $($install.ExitCode)." }
          $ide = Join-Path $env:LOCALAPPDATA 'Programs/FigureLoom Bio/FigureLoom Bio IDE.exe'
          if (-not (Test-Path $ide)) { throw 'Installed IDE was not found.' }
          $test = Start-Process -FilePath $ide -ArgumentList @('--self-test') -PassThru
          if (-not $test.WaitForExit(300000)) { Stop-Process -Id $test.Id -Force; throw 'Installed IDE visual self-test did not finish.' }
          if ($test.ExitCode -ne 0) { throw "Installed IDE visual self-test exited with code $($test.ExitCode)." }
          foreach ($name in @('figureloom-bio-light.png','figureloom-bio-dark.png')) {
            $path = Join-Path $env:FIGURELOOM_NATIVE_SCREENSHOT_DIR $name
            if (-not (Test-Path $path) -or (Get-Item $path).Length -eq 0) { throw "Missing screenshot: $name" }
          }

      - name: Upload exact installed-window screenshots
        uses: actions/upload-artifact@v7
        with:
          name: FigureLoom-Bio-Windows-Visual-Inspection
          path: ${{ runner.temp }}\figureloom-native-screenshots\*.png
          if-no-files-found: error

      - name: Report visual inspection ready
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 231 --repo $env:GITHUB_REPOSITORY --body "VISUAL CHECK READY: run $env:GITHUB_RUN_ID captured the exact installed Windows light and dark windows for inspection."

      - name: Report visual inspection failure
        if: failure()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 231 --repo $env:GITHUB_REPOSITORY --body "VISUAL CHECK FAILED: run $env:GITHUB_RUN_ID could not capture the installed Windows light/dark windows."
