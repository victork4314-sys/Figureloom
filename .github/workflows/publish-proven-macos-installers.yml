name: Publish proven FigureLoom Bio macOS installers
# Restricted same-repository macOS rescue trigger.

on:
  pull_request:
    paths:
      - '.github/workflows/publish-proven-macos-installers.yml'
      - '.github/rescue/build-test-publish-macos.sh'
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-proven-macos-installers.yml'
      - '.github/rescue/build-test-publish-macos.sh'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: publish-proven-figureloom-bio-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test_publish:
    if: github.event_name != 'pull_request' || (github.actor == 'victork4314-sys' && github.head_ref == 'rescue/publish-proven-macos')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
            package: FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
            test_folder: figureloom-bio-macos-arm-26-test
          - runner: macos-15
            arch: arm64
            package: FigureLoom-Bio-Installer-macOS-Apple-Silicon.pkg
            test_folder: figureloom-bio-macos-arm-15-test
          - runner: macos-26-intel
            arch: x86_64
            package: FigureLoom-Bio-Installer-macOS-Intel.pkg
            test_folder: figureloom-bio-macos-intel-26-test
          - runner: macos-15-intel
            arch: x86_64
            package: FigureLoom-Bio-Installer-macOS-Intel.pkg
            test_folder: figureloom-bio-macos-intel-15-test
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - name: Checkout trusted repository state
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build, install-test, publish, and verify the matching macOS package
        env:
          GH_TOKEN: ${{ github.token }}
          FIGURELOOM_MAC_ARCH_LABEL: ${{ matrix.arch }}
          FIGURELOOM_MAC_PACKAGE_NAME: ${{ matrix.package }}
          FIGURELOOM_MAC_TEST_FOLDER: ${{ matrix.test_folder }}
        run: bash .github/rescue/build-test-publish-macos.sh

      - name: Upload macOS install traces
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: FigureLoom-Bio-macOS-${{ matrix.runner }}-Install-Trace
          path: |
            ${{ runner.temp }}/${{ matrix.arch }}-install-test.log
            ${{ runner.temp }}/${{ matrix.arch }}-system-installer.log
          if-no-files-found: warn

      - name: Upload tested macOS package backup
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: FigureLoom-Bio-macOS-${{ matrix.runner }}-Package
          path: dist/${{ matrix.package }}
          if-no-files-found: error
