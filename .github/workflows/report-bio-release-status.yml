name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded Mac publishers and report final run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Run 6 (30095516492, commit 32ea461) is the fully bounded final run.
          # Runs 4 and 5 are superseded and must not keep either Mac runner.
          gh run cancel 30095038489 --repo "$GITHUB_REPOSITORY" || true
          gh run cancel 30095454327 --repo "$GITHUB_REPOSITORY" || true

          sleep 5
          gh run view 30095516492 \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > /tmp/final.json
          {
            echo 'Final bounded Mac publisher:'
            echo '```json'
            cat /tmp/final.json
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
