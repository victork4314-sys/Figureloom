name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report exact Intel failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=30092415672
          intel_job=89478464392
          gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,event,createdAt,updatedAt,url,jobs \
            > /tmp/macos-run.json
          gh run view "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --job "$intel_job" \
            --log > /tmp/intel-full.log 2>&1 || true
          tail -n 180 /tmp/intel-full.log > /tmp/intel-tail.log
          {
            echo 'Independent Mac publisher:'
            echo '```json'
            cat /tmp/macos-run.json
            echo '```'
            echo
            echo 'Intel failed-job tail:'
            echo '```text'
            cat /tmp/intel-tail.log
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
