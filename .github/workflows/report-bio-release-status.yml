name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report exact Intel failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          intel_job=89478464392
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$intel_job/logs" > /tmp/intel-log.bin
          if unzip -t /tmp/intel-log.bin >/dev/null 2>&1; then
            unzip -p /tmp/intel-log.bin > /tmp/intel-full.log
          else
            cp /tmp/intel-log.bin /tmp/intel-full.log
          fi
          tail -n 60 /tmp/intel-full.log > /tmp/intel-tail.log
          {
            echo 'Intel failed-job tail:'
            echo '```text'
            cat /tmp/intel-tail.log
            echo '```'
          } > /tmp/status.md
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
