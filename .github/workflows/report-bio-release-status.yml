name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Keep only newest Mac publisher and report it
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow publish-fixed-macos-installers.yml \
            --branch main \
            --limit 20 \
            --json databaseId,status,conclusion,headSha,event,number,createdAt,updatedAt,url \
            > /tmp/runs.json

          newest="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          test -n "$newest"

          jq -r --arg newest "$newest" \
            '.[] | select((.status == "queued" or .status == "in_progress" or .status == "pending" or .status == "waiting") and (.databaseId|tostring) != $newest) | .databaseId' \
            /tmp/runs.json > /tmp/older-active.txt

          while read -r run_id; do
            [[ -n "$run_id" ]] || continue
            echo "Cancelling superseded Mac publisher $run_id"
            gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done < /tmp/older-active.txt

          # The old combined desktop publisher duplicates both Mac builds and can
          # occupy the scarce hosted Mac runners. It is obsolete now that the
          # dedicated atomic Mac publisher owns both packages.
          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow build-bio-cross-platform-installers.yml \
            --branch main \
            --limit 20 \
            --json databaseId,status \
            --jq '.[] | select(.status == "queued" or .status == "in_progress" or .status == "pending" or .status == "waiting") | .databaseId' \
            > /tmp/combined-active.txt

          while read -r run_id; do
            [[ -n "$run_id" ]] || continue
            echo "Cancelling obsolete combined publisher $run_id"
            gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done < /tmp/combined-active.txt

          sleep 5
          gh run view "$newest" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > /tmp/newest.json

          {
            echo 'Newest Mac publisher only:'
            echo '```json'
            cat /tmp/newest.json
            echo '```'
          } > /tmp/status.md

          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"

# refresh after direct deterministic Test-app self-test
