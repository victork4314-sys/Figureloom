name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Report live final Mac job tails
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          : > /tmp/status.md
          for item in 'Apple Silicon:89486991692' 'Intel:89486991629'; do
            name="${item%%:*}"
            job="${item##*:}"
            echo "$name live log tail:" >> /tmp/status.md
            echo '```text' >> /tmp/status.md
            set +e
            gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$job/logs" > "/tmp/$job.bin" 2> "/tmp/$job.err"
            result=$?
            set -e
            if [[ $result -eq 0 ]]; then
              if unzip -t "/tmp/$job.bin" >/dev/null 2>&1; then
                unzip -p "/tmp/$job.bin" | tail -n 50 >> /tmp/status.md
              else
                tail -n 50 "/tmp/$job.bin" >> /tmp/status.md
              fi
            else
              cat "/tmp/$job.err" >> /tmp/status.md
            fi
            echo '```' >> /tmp/status.md
            echo >> /tmp/status.md
          done
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
