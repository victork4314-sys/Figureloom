name: Report FigureLoom Bio release status

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/report-bio-release-status.yml'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Keep newest publisher and show Apple failure tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow publish-fixed-macos-installers.yml \
            --branch main \
            --limit 20 \
            --json databaseId,status,conclusion,headSha,event,number,createdAt,updatedAt,url \
            > /tmp/runs.json

          newest="$(jq -r '.[0].databaseId // empty' /tmp/runs.json)"
          test -n "$newest"

          jq -r --arg newest "$newest" \
            '.[] | select((.status == "queued" or .status == "in_progress" or .status == "pending" or .status == "waiting") and (.databaseId|tostring) != $newest) | .databaseId' \
            /tmp/runs.json > /tmp/older-active.txt

          while read -r run_id; do
            [[ -n "$run_id" ]] || continue
            gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done < /tmp/older-active.txt

          gh run view "$newest" \
            --repo "$GITHUB_REPOSITORY" \
            --json databaseId,status,conclusion,headSha,createdAt,updatedAt,url,jobs \
            > /tmp/newest.json

          apple_job=89489398478
          gh api "repos/$GITHUB_REPOSITORY/actions/jobs/$apple_job/logs" > /tmp/apple.bin
          if unzip -t /tmp/apple.bin >/dev/null 2>&1; then
            unzip -p /tmp/apple.bin > /tmp/apple.log
          else
            cp /tmp/apple.bin /tmp/apple.log
          fi
          tail -n 90 /tmp/apple.log > /tmp/apple-tail.log

          {
            echo 'Newest Mac publisher only:'
            echo '```json'
            cat /tmp/newest.json
            echo '```'
            echo
            echo 'Apple Silicon failed-proof tail:'
            echo '```text'
            cat /tmp/apple-tail.log
            echo '```'
          } > /tmp/status.md

          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/issues/comments/5069780966" \
            -f "body=$(cat /tmp/status.md)"
