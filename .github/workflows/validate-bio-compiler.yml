name: Validate FigureLoom Bio compiler

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  compiler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check compiler JavaScript syntax
        run: |
          node --check ide/ide-language-compiler.js
          node --check ide/ide-language-catalog-ui.js
          node --check ide/ide-vocabulary-ui-copy.js

      - name: Check compiler Python syntax
        run: |
          python3 -m py_compile \
            figureloom-bio/figureloom_bio/language_compiler.py \
            figureloom-bio/figureloom_bio/language_compiler_runtime.py \
            figureloom-bio/figureloom_bio/parser.py \
            figureloom-bio/figureloom_bio/language_diagnostics.py \
            figureloom-bio/figureloom_bio/cli.py

      - name: Run compiler regression tests
        run: |
          cd figureloom-bio
          python3 -m unittest tests.test_language_compiler tests.test_parser_explanations -v

      - name: Run full FigureLoom Bio tests
        run: |
          cd figureloom-bio
          python3 -m unittest discover -s tests -v

      - name: Validate documentation
        run: node scripts/validate-bio-documentation.mjs
