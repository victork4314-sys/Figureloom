name: Validate FigureLoom Bio compiler

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  compiler:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check compiler JavaScript syntax
        run: |
          node --check ide/ide-language-compiler.js
          node --check ide/ide-language-catalog-ui.js
          node --check ide/ide-vocabulary-ui-copy.js

      - name: Check compiler Python syntax
        run: |
          python3 -m py_compile \
            figureloom-bio/figureloom_bio/language_compiler.py \
            figureloom-bio/figureloom_bio/language_compiler_runtime.py \
            figureloom-bio/figureloom_bio/parser.py \
            figureloom-bio/figureloom_bio/language_diagnostics.py \
            figureloom-bio/figureloom_bio/cli.py

      - name: Capture compiler regression tests
        id: compiler_tests
        shell: bash
        run: |
          set +e
          cd figureloom-bio
          python3 -m unittest tests.test_language_compiler tests.test_parser_explanations -v > ../compiler-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload compiler test log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: compiler-test-log
          path: compiler-test.log
          if-no-files-found: error

      - name: Require compiler regression tests
        if: steps.compiler_tests.outputs.status != '0'
        run: |
          cat compiler-test.log
          exit 1

      - name: Capture full FigureLoom Bio tests
        id: full_tests
        shell: bash
        run: |
          set +e
          cd figureloom-bio
          python3 -m unittest discover -s tests -v > ../full-bio-test.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload full FigureLoom Bio test log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: full-bio-test-log
          path: full-bio-test.log
          if-no-files-found: error

      - name: Require full FigureLoom Bio tests
        if: steps.full_tests.outputs.status != '0'
        run: |
          tail -n 300 full-bio-test.log
          exit 1

      - name: Validate documentation
        run: node scripts/validate-bio-documentation.mjs
