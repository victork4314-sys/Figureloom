name: Localization stopped

on:
  pull_request:
    branches: [localization-workflow-base]
    paths:
      - scripts/localization-audit.mjs
      - .github/workflows/localization-model-smoke.yml

concurrency:
  group: complete-interface-localization-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  stop:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm localization stopped
        run: echo "Localization stopped by user request."
