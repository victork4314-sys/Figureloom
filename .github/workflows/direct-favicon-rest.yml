name: Direct favicon REST update

on:
  push:
    branches: [favicon-rest-update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build favicon.ico from the FigureLoom mark
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick
          convert -background none figureloom-favicon.svg -define icon:auto-resize=48,32,16 favicon.ico
          file favicon.ico

      - name: Commit only favicon.ico through Git Data REST API
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.request

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          base = f'https://api.github.com/repos/{repo}'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def request(method, path, body=None):
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(base + path, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req) as response:
                  return json.load(response)

          icon = base64.b64encode(open('favicon.ico', 'rb').read()).decode()
          blob = request('POST', '/git/blobs', {'content': icon, 'encoding': 'base64'})
          ref = request('GET', '/git/ref/heads/main')
          parent = ref['object']['sha']
          previous = request('GET', f'/git/commits/{parent}')
          tree = request('POST', '/git/trees', {
              'base_tree': previous['tree']['sha'],
              'tree': [{
                  'path': 'favicon.ico',
                  'mode': '100644',
                  'type': 'blob',
                  'sha': blob['sha'],
              }],
          })
          commit = request('POST', '/git/commits', {
              'message': 'Update favicon',
              'tree': tree['sha'],
              'parents': [parent],
          })
          request('PATCH', '/git/refs/heads/main', {
              'sha': commit['sha'],
              'force': False,
          })
          print(commit['sha'])
          PY
