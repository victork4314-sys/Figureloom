name: FigureLoom MCP

on:
  push:
    branches: [main]
    paths:
      - 'mcp-*.js'
      - 'mcp-server/**'
      - 'tests/mcp-settings.spec.js'
      - 'safe-refresh.js'
      - 'service-worker.js'
      - '.github/workflows/mcp-server.yml'
  pull_request:
    paths:
      - 'mcp-*.js'
      - 'mcp-server/**'
      - 'tests/mcp-settings.spec.js'
      - 'safe-refresh.js'
      - 'service-worker.js'
      - '.github/workflows/mcp-server.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package.json
      - name: Check browser MCP modules
        run: |
          node --check mcp-command-registry.js
          node --check mcp-project-command-adapter.js
          node --check mcp-browser-bridge.js
          node --check mcp-settings-panel.js
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm install --no-audit --no-fund
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          set +e
          cd mcp-server
          npm run typecheck -- --pretty false > ../mcp-typecheck.log 2>&1
          status=$?
          echo "$status" > ../mcp-typecheck.status
          cat ../mcp-typecheck.log
          exit 0
      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-typecheck
          path: |
            mcp-typecheck.log
            mcp-typecheck.status
          if-no-files-found: error
      - name: Require successful type-check
        shell: bash
        run: test "$(cat mcp-typecheck.status)" = "0"
      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build

  browser:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Test MCP Settings and editor history bridge
        run: npx playwright test tests/mcp-settings.spec.js --project=desktop
