name: FigureLoom MCP

on:
  push:
    branches: [main]
    paths:
      - 'mcp-*.js'
      - 'mcp-server/**'
      - 'safe-refresh.js'
      - 'service-worker.js'
      - '.github/workflows/mcp-server.yml'
  pull_request:
    paths:
      - 'mcp-*.js'
      - 'mcp-server/**'
      - 'safe-refresh.js'
      - 'service-worker.js'
      - '.github/workflows/mcp-server.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package.json
      - name: Check browser MCP modules
        run: |
          node --check mcp-command-registry.js
          node --check mcp-project-command-adapter.js
          node --check mcp-browser-bridge.js
          node --check mcp-settings-panel.js
      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm install --no-audit --no-fund
      - name: Type-check MCP server
        working-directory: mcp-server
        run: npm run typecheck
      - name: Build MCP server
        working-directory: mcp-server
        run: npm run build
