name: Build FigureLoom Bio Windows and macOS installers

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-bio-cross-platform-installers.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: figureloom-bio-cross-platform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  queue_reset:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo 'This temporary no-run commit cancels the stale heavyweight release build so the proven Windows publisher can start.'
